<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个性化学习助手 - PRTS Learning Terminal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 50%, #0d1321 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            color: #d0e0f0;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(80, 160, 220, 0.5);
        }
        .subtitle {
            color: #80a0c0;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .features {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .feature {
            padding: 20px 30px;
            background: rgba(60, 80, 120, 0.3);
            border-radius: 10px;
            color: #d0e0f0;
            font-size: 14px;
            transition: all 0.3s;
        }
        .feature:hover {
            transform: scale(1.05);
            background: rgba(80, 120, 180, 0.4);
        }
        .btn {
            padding: 12px 40px;
            background: linear-gradient(135deg, #4080c0 0%, #60a0e0 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(80, 160, 220, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(80, 160, 220, 0.6);
        }
        .tech-stack {
            margin-top: 40px;
            color: #6080a0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🧠</div>
        <h1>个性化学习助手</h1>
        <p class="subtitle">Personalized Learning Assistant - 为你的学习之路保驾护航</p>
        
        <div class="features">
            <div class="feature">📚 智能课程推荐</div>
            <div class="feature">🤖 AI学习辅导</div>
            <div class="feature">🧠 知识图谱</div>
            <div class="feature">📊 学习数据分析</div>
            <div class="feature">⭐ 游戏化学习</div>
            <div class="feature">💾 数据加密存储</div>
        </div>
        
        <a href="明日方舟学习终端.html" class="btn">🚀 开始学习</a>
        
        <div class="tech-stack">
            Built with HTML5 + CSS3 + JavaScript + Flask
        </div>
    </div>
</body>
</html>
